# ESP32-A1S Audio Kit -- Sendspin (Music Assistant multi-room) config
# Board:    AI-Thinker ESP32-A1S Audio Kit (ES8388 codec)
# Requires: ESPHome >= 2026.5.0 (sendspin in core), Music Assistant >= 2.7.0b19
# Repo:     https://github.com/el-bakkali/esp32-a1s-sendspin
# Setup:    cp secrets.yaml.example secrets.yaml  ->  esphome run esp32-a1s.yaml

esphome:
  name: esp32-a1s
  friendly_name: ESP32-A1S
  on_boot:
    # Route audio to both headphone jack and speaker amp at startup
    priority: -100
    then:
      - select.set:
          id: dac_output_select
          option: "BOTH"

esp32:
  board: esp-wrover-kit
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback AP / captive portal when WiFi is unavailable
  ap:
    ssid: "Esp32-A1S Fallback Hotspot"
    password: !secret ap_password

captive_portal:

# PSRAM required: sendspin task stack and audio decode buffers live here
psram:

# ===== ES8388 audio codec (I2C control + I2S audio) =====
# Docs: https://esphome.io/components/audio_dac/es8388/
i2c:
  sda: GPIO33
  scl: GPIO32
  frequency: 100kHz
  id: bus_a

audio_dac:
  - platform: es8388
    id: es8388_dac

select:
  - platform: es8388
    es8388_id: es8388_dac
    dac_output:
      id: dac_output_select
      name: "DAC Output"
    adc_input_mic:
      name: "ADC Input MIC"

i2s_audio:
  id: i2s_output
  i2s_lrclk_pin: GPIO25
  i2s_bclk_pin: GPIO27
  i2s_mclk_pin: GPIO0

# ===== On-board speaker amp enable (GPIO21) =====
switch:
  - platform: gpio
    pin: GPIO21
    id: mute_switch
    name: "AMP Switch"
    restore_mode: ALWAYS_ON

# ===== On-board microphone (I2S from ES8388 ADC) =====
microphone:
  - platform: i2s_audio
    i2s_din_pin: GPIO35
    id: mic1
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit

# ===== On-board buttons + headphone-jack detect =====
binary_sensor:
  # Headphone jack insertion sensor
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
      mode:
        input: true
    name: "Jack Status"

  # Keys 1-6: physical buttons on the board
  - platform: gpio
    pin:
      number: GPIO036
      inverted: true
    name: "Key 1"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO013
      inverted: true
    name: "Key 2"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO019
      inverted: true
    name: "Key 3"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO023
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Key 4"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO018
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Key 5"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO005
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Key 6"
    filters:
      - delayed_off: 10ms

# ===== Onboard status LED =====
light:
  - platform: status_led
    name: "Red LED"
    pin:
      number: GPIO22
      inverted: true

# ============================================================
#  Sendspin multi-room audio (core component since 2026.5.0)
# ============================================================

# I2S speaker output -- consumes the sendspin audio pipeline
speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_output
    sample_rate: 48000
    id: i2s_speaker_output
    i2s_dout_pin: GPIO26
    bits_per_sample: 16bit
    dac_type: external
    channel: stereo
    timeout: never
    buffer_duration: 100ms
    audio_dac: es8388_dac

# Sendspin hub: discovers the Sendspin server via mDNS (TCP 8928)
sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

# Synchronized audio stream from the Sendspin group
media_source:
  - platform: sendspin
    id: sendspin_source

# Media player entity exposed to Home Assistant / Music Assistant
media_player:
  - platform: speaker_source
    id: sendspin_media_player
    name: Sendspin Media Player
    media_pipeline:
      speaker: i2s_speaker_output
      sources:
        - sendspin_source

# ===== Track metadata (optional, drives HA entities / displays) =====
text_sensor:
  - platform: sendspin
    type: title
    name: Track Title

  - platform: sendspin
    type: artist
    name: Artist

  - platform: sendspin
    type: album
    name: Album

  - platform: sendspin
    type: year
    name: Year

  - platform: sendspin
    type: track
    name: Track Number

# Numeric metadata (track duration, progress, etc.)
sensor:
  - platform: sendspin
    type: track_duration
    id: sendspin_track_duration
